name: TOS Check

on:
  issues:
    types:
      - opened
      - reopened
      - edited

env:
  GH_TOKEN: ${{ github.token }}
  GH_REPO: ${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  check:
    name: Ensure Terms of Service are accepted
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse issue body
        id: parse
        uses: zentered/issue-forms-body-parser@v1.5.1

      - name: Find TOS checkbox state
        id: tos
        run: |
          echo "tos=$(echo '${{ steps.parse.outputs.data }}' | jq -r '.["terms-of-services"].list[0].checked' )" >> $GITHUB_OUTPUT

      - name: Remove 'tos/accepted' label
        if: steps.tos.outputs.tos == 'false'
        run: gh issue edit ${{ github.event.issue.number }} --remove-label tos/accepted

      - name: Add 'tos/accepted' label
        if: steps.tos.outputs.tos == 'true'
        run: gh issue edit ${{ github.event.issue.number }} --add-label tos/accepted

      - name: Add Comment if tos not accepted
        if: steps.tos.outputs.tos == 'false'
        uses: peter-evans/create-or-update-comment@v2
        with:
          edit-mode: replace
          issue-number: ${{ github.event.issue.number }}
          body: |
            :x: Terms of Service not accepted yet

            See [${{ github.workflow}}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Add Comment if tos accepted
        if: steps.tos.outputs.tos == 'true'
        uses: peter-evans/create-or-update-comment@v2
        with:
          edit-mode: replace
          issue-number: ${{ github.event.issue.number }}
          body: |
            :white_check_mark: Terms of Service accepted

            See [${{ github.workflow}}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      - name: Add comment if tos not found
        if: steps.tos.outputs.tos == 'null'
        uses: peter-evans/create-or-update-comment@v2
        with:
          edit-mode: replace
          issue-number: ${{ github.event.issue.number }}
          body: |
            :no_entry_sign: Can't find the checkbox for the terms of service. Please add it to the issue body.

            See [${{ github.workflow }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).
